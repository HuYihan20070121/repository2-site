<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>动态探照灯：汽车局部展示 | 正方形移动效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动干扰 */
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .canvas-wrapper {
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .info-panel {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            color: #eef4ff;
            padding: 0.5rem 1rem;
        }

        .status {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-left: 3px solid #ffaa44;
            font-family: monospace;
        }

        .badge {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            background: #00000088;
            padding: 5px 12px;
            border-radius: 30px;
            align-items: center;
        }

        .badge span {
            color: #ffcc77;
            font-weight: bold;
        }

        button {
            background: #2c3e4e;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            font-size: 0.8rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            background: #ff884d;
            color: #1e2a32;
            transform: scale(0.96);
            box-shadow: 0 1px 3px black;
        }

        .credit {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 8px;
            text-align: center;
            width: 100%;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .loading-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000cc;
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffdd99;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div>
    <div class="container">
        <div class="canvas-wrapper" style="position: relative;">
            <canvas id="carCanvas" width="800" height="500" style="width:100%; height:auto; background: black;"></canvas>
            <div id="loadingMsg" class="loading-tip">🚗 加载汽车图片中...</div>
        </div>
        <div class="info-panel">
            <div class="status">🔲 探照灯移动 · 仅显示正方形内局部</div>
            <div class="badge">
                <span>⬜ 动态方块</span> 从左上 ➔ 右下
            </div>
            <button id="resetAnimBtn">⟳ 重置动画</button>
        </div>
        <div class="credit">
            🚘 网络汽车图片 | 正方形窗口循环移动 | 只显示覆盖区域
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 配置 ----------
        // 使用高质量、高稳定性的汽车图片 (网络真实图片, 支持跨域绘制无污染)
        // 图片来源: Pexels 免费图库 - 红色跑车，允许使用且稳定
        const CAR_IMAGE_URL = "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg?auto=compress&cs=tinysrgb&w=1000&h=700&dpr=2";
        // 备用图片 (如果主图加载失败则使用另一张可靠汽车图)
        const FALLBACK_IMAGE_URL = "https://images.pexels.com/photos/116675/pexels-photo-116675.jpeg?auto=compress&cs=tinysrgb&w=1000&h=700";
        
        // DOM 元素
        const canvas = document.getElementById('carCanvas');
        const ctx = canvas.getContext('2d');
        const loadingDiv = document.getElementById('loadingMsg');
        const resetBtn = document.getElementById('resetAnimBtn');
        
        // 动画相关变量
        let img = new Image();
        let isImageLoaded = false;
        let animationId = null;
        let progress = 0;           // 0 -> 1  (0=左上角, 1=右下角终点)
        let speed = 0.0028;         // 每帧增量(约60帧 单程约6秒)，配合动态时间增量更平滑? 改用基于时间的增量
        
        // 基于时间的动画控制 (更平滑，不受帧率影响)
        let lastTimestamp = null;
        let animating = true;
        const ONE_WAY_DURATION = 4200;   // 单程移动耗时 4.2 秒 (毫秒)
        let cycleStartTime = null;       // 当前周期起始时间(performance)
        
        // 画布参数 (会根据图片尺寸动态调整)
        let canvasWidth = 800;      // 初始占位
        let canvasHeight = 500;
        
        // 汽车图片绘制参数 (居中保持比例适应)
        let drawParams = {
            dx: 0,      // 绘制目标x偏移
            dy: 0,
            dw: 0,      // 绘制宽度
            dh: 0
        };
        
        // 正方形探照灯参数
        let squareSize = 120;       // 动态计算，初始化后重新调整
        let maxX = 0;               // 正方形移动最大X坐标 (canvas.width - squareSize)
        let maxY = 0;               // 正方形移动最大Y坐标
        
        // 当前正方形左上角坐标 (实时计算)
        let currentRect = { x: 0, y: 0 };
        
        // ---------- 辅助函数 ----------
        // 计算居中绘制参数 (使图片完整显示在canvas内，保持比例，留黑边但不影响效果)
        function computeDrawParams(imgWidth, imgHeight, targetWidth, targetHeight) {
            const imgRatio = imgWidth / imgHeight;
            const canvasRatio = targetWidth / targetHeight;
            let drawWidth, drawHeight, offsetX, offsetY;
            
            if (imgRatio > canvasRatio) {
                // 图片更宽，以宽度为准，上下留黑边
                drawWidth = targetWidth;
                drawHeight = targetWidth / imgRatio;
                offsetX = 0;
                offsetY = (targetHeight - drawHeight) / 2;
            } else {
                // 图片更高，以高度为准，左右留黑边
                drawHeight = targetHeight;
                drawWidth = targetHeight * imgRatio;
                offsetX = (targetWidth - drawWidth) / 2;
                offsetY = 0;
            }
            return { dx: offsetX, dy: offsetY, dw: drawWidth, dh: drawHeight };
        }
        
        // 根据画布尺寸重新计算正方形大小和移动边界 (图片加载完成后调用)
        function updateSquareAndBounds() {
            if (!isImageLoaded) return;
            // 正方形边长: 画布短边的 22% ~ 28% 之间，保证视觉舒适，范围 90px ~ 170px
            const minSide = Math.min(canvasWidth, canvasHeight);
            let size = Math.floor(minSide * 0.24);
            size = Math.min(Math.max(size, 90), 170);
            squareSize = size;
            
            // 边界范围 (正方形左上角可移动区域)
            maxX = canvasWidth - squareSize;
            maxY = canvasHeight - squareSize;
            // 确保边界不为负数
            if (maxX < 0) maxX = 0;
            if (maxY < 0) maxY = 0;
            
            // 重新计算当前进度对应的位置 (保证重置时边界更新)
            updateRectByProgress(progress);
        }
        
        // 根据进度 (0~1) 计算正方形位置 (对角线从 (0,0) 到 (maxX, maxY))
        function updateRectByProgress(prog) {
            if (!isImageLoaded) return;
            let t = Math.min(Math.max(prog, 0), 1);
            let x = t * maxX;
            let y = t * maxY;
            // 边界取整避免亚像素偏移闪烁 (但无伤大雅)
            currentRect.x = x;
            currentRect.y = y;
        }
        
        // 核心绘制: 背景黑色 + 正方形剪辑区域内绘制汽车图片 + 绘制正方形边框
        function drawScene() {
            if (!isImageLoaded) return;
            if (!ctx) return;
            
            // 1. 清空并填充纯黑背景 (确保正方形外部完全不显示汽车)
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            // 2. 保存画布状态，设置剪辑区域 (正方形区域)
            ctx.save();
            ctx.beginPath();
            // 当前正方形位置
            const rectX = currentRect.x;
            const rectY = currentRect.y;
            ctx.rect(rectX, rectY, squareSize, squareSize);
            ctx.clip();   // 之后绘制的内容只在这个正方形区域内显示
            
            // 3. 在剪辑区域内绘制完整的汽车图片 (居中适应绘制)
            ctx.drawImage(img, drawParams.dx, drawParams.dy, drawParams.dw, drawParams.dh);
            ctx.restore();  // 恢复上下文，取消剪辑区域
            
            // 4. 绘制正方形边框 (半透明白色+发光感，让用户清晰看到移动窗口)
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#FFE484";
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 6]);
            ctx.strokeRect(rectX, rectY, squareSize, squareSize);
            // 外发光小边框增强
            ctx.strokeStyle = "#FFFFFFcc";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([]);
            ctx.strokeRect(rectX - 0.5, rectY - 0.5, squareSize + 1, squareSize + 1);
            // 添加微弱内阴影效果
            ctx.restore();
            
            // 可选: 在正方形角落添加轻微指示点 (加强动感)
            ctx.fillStyle = "#FFD966";
            ctx.shadowBlur = 0;
            ctx.fillRect(rectX + squareSize - 8, rectY + squareSize - 8, 5, 5);
            ctx.fillStyle = "#FFAA33";
            ctx.fillRect(rectX + squareSize - 6, rectY + squareSize - 6, 3, 3);
        }
        
        // 基于时间的动画循环 (progress 从0到1 循环移动)
        function startTimeBasedAnimation(nowTime) {
            if (!isImageLoaded) {
                // 图片未加载完成时继续等待, 但不重绘背景无效
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(startTimeBasedAnimation);
                return;
            }
            
            if (!animating) return;
            
            const now = performance.now();
            if (cycleStartTime === null) {
                cycleStartTime = now;
                lastTimestamp = now;
                // 保持当前progress位置不变继续，如果重置会重新设定
            }
            
            // 计算当前周期已经过去的时间
            let elapsed = now - cycleStartTime;
            // 单程周期长度 (0->1)
            let t = (elapsed % ONE_WAY_DURATION) / ONE_WAY_DURATION;   // 0..1 循环
            
            // 平滑缓动曲线? 为了视觉效果线性移动即可，也可以使用 easeInOut 但线性最符合直观
            // 这里使用线性移动，让正方形匀速从左上到右下
            progress = t;
            
            // 根据最新progress更新正方形坐标
            if (isImageLoaded && maxX >= 0 && maxY >= 0) {
                updateRectByProgress(progress);
                // 重绘画布
                drawScene();
            }
            
            // 继续动画循环
            animationId = requestAnimationFrame(startTimeBasedAnimation);
        }
        
        // 重置动画（重置进度到0，重新开始周期）
        function resetAnimation() {
            if (!isImageLoaded) return;
            // 重置周期起始时间，让 progress 归零
            cycleStartTime = performance.now();
            progress = 0;
            updateRectByProgress(0);
            drawScene();
            // 如果动画未运行，重启
            if (!animationId) {
                animating = true;
                animationId = requestAnimationFrame(startTimeBasedAnimation);
            }
        }
        
        // 处理图片加载完成后的配置
        function onImageLoaded() {
            isImageLoaded = true;
            // 获取图片原始尺寸
            const imgW = img.naturalWidth;
            const imgH = img.naturalHeight;
            if (!imgW || !imgH) {
                console.warn("图片尺寸异常");
                return;
            }
            
            // 设计画布尺寸: 限制最大宽度 1000px 且高度适配，同时兼顾显示清晰与性能
            const maxCanvasWidth = Math.min(window.innerWidth - 80, 1100);
            // 根据图片比例决定canvas实际分辨率
            let targetW, targetH;
            if (imgW > imgH) {
                targetW = Math.min(imgW, maxCanvasWidth);
                targetH = (targetW / imgW) * imgH;
            } else {
                targetH = Math.min(imgH, 700);
                targetW = (targetH / imgH) * imgW;
            }
            targetW = Math.floor(targetW);
            targetH = Math.floor(targetH);
            
            canvasWidth = targetW;
            canvasHeight = targetH;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            // 重新计算汽车绘制参数 (居中显示)
            drawParams = computeDrawParams(imgW, imgH, canvasWidth, canvasHeight);
            
            // 更新正方形尺寸及边界
            updateSquareAndBounds();
            
            // 进度归零
            progress = 0;
            updateRectByProgress(0);
            
            // 隐藏loading提示
            if (loadingDiv) loadingDiv.style.display = 'none';
            
            // 首次绘制场景
            drawScene();
            
            // 启动动画 (如果已经存在则先取消)
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            cycleStartTime = performance.now();   // 重置周期起始
            animating = true;
            animationId = requestAnimationFrame(startTimeBasedAnimation);
        }
        
        // 图片加载失败时的处理: 尝试备用图片
        function handleImageError() {
            console.warn("主图加载失败，尝试备用图片...");
            if (loadingDiv) loadingDiv.innerHTML = "⚠️ 切换备用汽车图片...";
            img.src = FALLBACK_IMAGE_URL;
            img.onerror = () => {
                console.error("备用图片也加载失败，生成示意图案维持演示");
                if (loadingDiv) loadingDiv.innerHTML = "🚘 绘制示意汽车 (网络超时)";
                // 创建一个占位图案 canvas 作为图片内容 (绘图保底)
                const fallbackCanvas = document.createElement('canvas');
                fallbackCanvas.width = 1200;
                fallbackCanvas.height = 800;
                const fallbackCtx = fallbackCanvas.getContext('2d');
                fallbackCtx.fillStyle = "#2c3e2f";
                fallbackCtx.fillRect(0, 0, 1200, 800);
                fallbackCtx.fillStyle = "#c0392b";
                fallbackCtx.fillRect(200, 300, 800, 300);
                fallbackCtx.fillStyle = "#34495e";
                fallbackCtx.fillRect(300, 500, 150, 100);
                fallbackCtx.fillRect(750, 500, 150, 100);
                fallbackCtx.fillStyle = "#f1c40f";
                fallbackCtx.beginPath();
                fallbackCtx.arc(450, 650, 45, 0, Math.PI*2);
                fallbackCtx.arc(850, 650, 45, 0, Math.PI*2);
                fallbackCtx.fill();
                fallbackCanvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    img.src = url;
                    img.onload = () => {
                        URL.revokeObjectURL(url);
                        onImageLoaded();
                    };
                });
            };
        }
        
        // 初始化图片加载
        function initImage() {
            img.crossOrigin = "Anonymous";  // 尝试匿名请求，避免canvas污染(但绘制无getImageData, 无所谓)
            img.onload = onImageLoaded;
            img.onerror = handleImageError;
            img.src = CAR_IMAGE_URL;
            // 超时检测
            setTimeout(() => {
                if (!isImageLoaded && img.src) {
                    if (!img.complete) {
                        handleImageError();
                    }
                }
            }, 5000);
        }
        
        // 窗口尺寸变化时，可能需要重新调整canvas的CSS显示比例，但实际canvas分辨率不变，不影响内部动画
        // 但是为了最佳视觉，监听resize 仅调整css适应性 (canvas本身尺寸不变)
        function handleWindowResize() {
            if (!isImageLoaded) return;
            // 确保canvas元素CSS适应，无需改变实际像素，但为了保证正方形在视觉上比例协调，什么都不用做
            // 但为了避免周围容器变形导致正方形显示奇怪，我们只重绘一次保证边框清晰
            if (isImageLoaded) {
                drawScene();
            }
        }
        
        // 重置按钮事件
        resetBtn.addEventListener('click', () => {
            if (!isImageLoaded) return;
            resetAnimation();
        });
        
        // 手动加载
        initImage();
        window.addEventListener('resize', () => {
            setTimeout(handleWindowResize, 100);
        });
        
        // 页面退出时取消动画
        window.addEventListener('beforeunload', () => {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });
        
        // 若用户点击canvas，也可以手动重置（贴心小交互）
        canvas.addEventListener('dblclick', () => {
            resetAnimation();
        });
        
        // 额外控制台友好提示
        console.log("探照灯效果已启动 | 正方形从左上至右下移动，仅显示正方形内汽车局部");
    })();
</script>
</body>
</html>
